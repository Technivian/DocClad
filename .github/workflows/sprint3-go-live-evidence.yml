name: Sprint 3 Go-Live Evidence

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag or identifier"
        required: true
        type: string
      organization_slug:
        description: "Target organization slug for live integration checks"
        required: false
        default: ""
        type: string
      run_live_syncs:
        description: "Run live Salesforce and NetSuite sync commands before evidence capture"
        required: false
        default: true
        type: boolean
      require_dead_letter_evidence:
        description: "Require dead-letter webhook evidence for integration GO"
        required: false
        default: false
        type: boolean

jobs:
  collect-go-live-evidence:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: cms_aegis
          POSTGRES_USER: cms_aegis
          POSTGRES_PASSWORD: cms_aegis
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cms_aegis -d cms_aegis"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      DJANGO_ENV: production
      DJANGO_SECRET_KEY: this-is-only-for-ci-not-production-change-me-1234567890
      DATABASE_URL: postgresql://cms_aegis:cms_aegis@localhost:5432/cms_aegis
      ALLOWED_HOSTS: localhost,127.0.0.1
      CSRF_TRUSTED_ORIGINS: http://localhost
      DEFAULT_FROM_EMAIL: noreply@example.com
      ALLOW_SQLITE_IN_PRODUCTION: 'false'
      SALESFORCE_CLIENT_ID: ${{ secrets.SALESFORCE_CLIENT_ID }}
      SALESFORCE_CLIENT_SECRET: ${{ secrets.SALESFORCE_CLIENT_SECRET }}
      SALESFORCE_REDIRECT_URI: ${{ secrets.SALESFORCE_REDIRECT_URI }}
      NETSUITE_ACCOUNT_ID: ${{ secrets.NETSUITE_ACCOUNT_ID }}
      NETSUITE_CLIENT_ID: ${{ secrets.NETSUITE_CLIENT_ID }}
      NETSUITE_CLIENT_SECRET: ${{ secrets.NETSUITE_CLIENT_SECRET }}
      NETSUITE_TOKEN_URL: ${{ secrets.NETSUITE_TOKEN_URL }}
      NETSUITE_RECORDS_URL: ${{ secrets.NETSUITE_RECORDS_URL }}
      NETSUITE_SCOPE: ${{ secrets.NETSUITE_SCOPE }}
      ESIGN_WEBHOOK_SECRET: ${{ secrets.ESIGN_WEBHOOK_SECRET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/dev.txt

      - name: Prepare evidence directory
        run: mkdir -p evidence

      - name: Apply migrations
        run: python manage.py migrate --noinput

      - name: Seed baseline and synthetic evidence
        run: |
          python manage.py seed_sprint3_evidence --organization-slug "${{ inputs.organization_slug != '' && inputs.organization_slug || 'demo-firm' }}"

      - name: Run optional live syncs
        if: ${{ inputs.run_live_syncs }}
        run: |
          if [[ -z "${{ inputs.organization_slug }}" ]]; then
            echo "Skipping live syncs: no organization slug provided."
            exit 0
          fi
          if [[ -z "${SALESFORCE_CLIENT_ID}" || -z "${SALESFORCE_CLIENT_SECRET}" || -z "${NETSUITE_ACCOUNT_ID}" || -z "${NETSUITE_CLIENT_ID}" || -z "${NETSUITE_CLIENT_SECRET}" || -z "${NETSUITE_TOKEN_URL}" || -z "${NETSUITE_RECORDS_URL}" || -z "${ESIGN_WEBHOOK_SECRET}" ]]; then
            echo "Skipping live syncs: required integration secrets are not configured."
            exit 0
          fi
          python manage.py sync_salesforce_contracts --organization-slug "${{ inputs.organization_slug }}" --limit 200 > evidence/salesforce-sync-live.json
          python manage.py sync_netsuite_contracts --organization-slug "${{ inputs.organization_slug }}" --limit 200 > evidence/netsuite-sync-live.json
          python manage.py dispatch_webhook_deliveries --limit 200 > evidence/webhook-dispatch-live.json

      - name: Capture core gate evidence
        run: |
          python manage.py check > evidence/manage-check.txt
          python manage.py verify_postgres_cutover > evidence/postgres-cutover-evidence.json
          python manage.py generate_release_gate_report --output evidence/release-gate-report.json
          if [[ -n "${{ inputs.organization_slug }}" ]]; then
            python manage.py generate_executive_analytics_evidence --organization-slug "${{ inputs.organization_slug }}" --output evidence/executive-analytics-evidence.json
            python manage.py run_retention_jobs --organization-slug "${{ inputs.organization_slug }}" > evidence/retention-jobs-run.json
            python manage.py run_contract_lifecycle_jobs --organization-slug "${{ inputs.organization_slug }}" > evidence/contract-lifecycle-jobs-run.json
            python manage.py export_retention_audit_actions --organization-slug "${{ inputs.organization_slug }}" --output evidence/retention-audit-actions.json
            python manage.py generate_esign_integration_report --organization-slug "${{ inputs.organization_slug }}" --output evidence/esign-integration-report.json
          else
            python manage.py generate_executive_analytics_evidence --output evidence/executive-analytics-evidence.json
            python manage.py run_retention_jobs > evidence/retention-jobs-run.json
            python manage.py run_contract_lifecycle_jobs > evidence/contract-lifecycle-jobs-run.json
            python manage.py export_retention_audit_actions --output evidence/retention-audit-actions.json
            python manage.py generate_esign_integration_report --output evidence/esign-integration-report.json
          fi

      - name: Capture integration evidence
        run: |
          if [[ "${{ inputs.require_dead_letter_evidence }}" == "true" ]]; then
            python manage.py generate_sprint3_integration_report --require-dead-letter-evidence --output evidence/sprint3-integration-report.json
          else
            python manage.py generate_sprint3_integration_report --output evidence/sprint3-integration-report.json
          fi

      - name: Export and verify tamper-evident compliance bundle
        run: |
          python manage.py export_compliance_evidence_bundle \
            --include evidence/release-gate-report.json \
            --include evidence/sprint3-integration-report.json \
            --include evidence/esign-integration-report.json \
            --include evidence/postgres-cutover-evidence.json \
            --include evidence/executive-analytics-evidence.json \
            --include evidence/contract-lifecycle-jobs-run.json \
            --include evidence/retention-audit-actions.json \
            --output-dir evidence > evidence/compliance-evidence-export.json

          BUNDLE_PATH=$(python - <<'PY'
          import json
          data = json.load(open("evidence/compliance-evidence-export.json", "r", encoding="utf-8"))
          print(data["bundle_path"])
          PY
          )
          SHA256_PATH=$(python - <<'PY'
          import json
          data = json.load(open("evidence/compliance-evidence-export.json", "r", encoding="utf-8"))
          print(data["sha256_path"])
          PY
          )
          SIGNATURE_PATH=$(python - <<'PY'
          import json
          data = json.load(open("evidence/compliance-evidence-export.json", "r", encoding="utf-8"))
          print(data["signature_path"])
          PY
          )
          python manage.py verify_compliance_evidence_bundle \
            --bundle-path "${BUNDLE_PATH}" \
            --sha256-path "${SHA256_PATH}" \
            --signature-path "${SIGNATURE_PATH}" > evidence/compliance-evidence-verify.json

      - name: Evaluate GO/NO-GO
        run: |
          python - <<'PY'
          import json
          import sys

          gate = json.load(open("evidence/release-gate-report.json", "r", encoding="utf-8"))
          integrations = json.load(open("evidence/sprint3-integration-report.json", "r", encoding="utf-8"))
          esign = json.load(open("evidence/esign-integration-report.json", "r", encoding="utf-8"))

          failures = []
          if gate.get("go_no_go") != "GO":
              failures.append("release-gate-report")
          if integrations.get("status") != "GO":
              failures.append("sprint3-integration-report")
          if esign.get("status") != "GO":
              failures.append("esign-integration-report")

          if failures:
              print("NO-GO:", ", ".join(failures))
              sys.exit(1)
          print("GO: all sprint3 gate reports are green")
          PY

      - name: Add metadata
        run: |
          echo "release_tag=${{ inputs.release_tag }}" > evidence/metadata.txt
          echo "organization_slug=${{ inputs.organization_slug }}" >> evidence/metadata.txt
          echo "workflow_run_id=${{ github.run_id }}" >> evidence/metadata.txt
          echo "commit_sha=${{ github.sha }}" >> evidence/metadata.txt

      - name: Upload go-live evidence artifact
        uses: actions/upload-artifact@v4
        with:
          name: sprint3-go-live-evidence-${{ inputs.release_tag }}
          path: evidence/
          if-no-files-found: error