name: Salesforce Sync (CI smoke test)

# NOTE: MANUAL CI smoke test of the job machinery against an ephemeral CI
# SQLite DB. NOT proof that tenant production jobs ran. Production scheduling is
# owned by Render worker/cron services (render.yaml,
# docs/PHASE2_BACKGROUND_JOBS_RUNBOOK.md). Scheduled trigger removed so CI no
# longer masquerades as production execution.

on:
  workflow_dispatch:

jobs:
  salesforce-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DJANGO_ENV: production
      DJANGO_SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
      ALLOWED_HOSTS: localhost,127.0.0.1
      CSRF_TRUSTED_ORIGINS: http://localhost
      DEFAULT_FROM_EMAIL: noreply@example.com
      ALLOW_SQLITE_IN_PRODUCTION: 'true'
      SALESFORCE_CLIENT_ID: ${{ secrets.SALESFORCE_CLIENT_ID }}
      SALESFORCE_CLIENT_SECRET: ${{ secrets.SALESFORCE_CLIENT_SECRET }}
      SALESFORCE_REDIRECT_URI: ${{ secrets.SALESFORCE_REDIRECT_URI }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/runtime.txt

      - name: Apply migrations
        run: python manage.py migrate --noinput

      - name: Queue background jobs
        run: python manage.py queue_background_jobs

      - name: Process background jobs
        run: python manage.py process_background_jobs --limit 100

      - name: Dispatch webhook deliveries
        run: python manage.py dispatch_webhook_deliveries --limit 200
