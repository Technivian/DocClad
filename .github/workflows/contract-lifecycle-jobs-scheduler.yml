name: Contract Lifecycle Jobs Scheduler

on:
  schedule:
    - cron: '30 2 * * *'
  workflow_dispatch:

jobs:
  contract-lifecycle-jobs:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DJANGO_ENV: production
      DJANGO_SECRET_KEY: this-is-only-for-ci-not-production-change-me-1234567890
      ALLOWED_HOSTS: localhost,127.0.0.1
      CSRF_TRUSTED_ORIGINS: http://localhost
      DEFAULT_FROM_EMAIL: noreply@example.com
      ALLOW_SQLITE_IN_PRODUCTION: 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/runtime.txt

      - name: Apply migrations
        run: python manage.py migrate --noinput

      - name: Run contract lifecycle jobs
        run: python manage.py run_contract_lifecycle_jobs > contract-lifecycle-jobs-run.json

      - name: Upload lifecycle evidence artifact
        uses: actions/upload-artifact@v4
        with:
          name: contract-lifecycle-execution-evidence-${{ github.run_id }}
          path: contract-lifecycle-jobs-run.json
          if-no-files-found: error