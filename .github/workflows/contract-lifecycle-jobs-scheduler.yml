name: Contract Lifecycle Jobs (CI smoke test)

# NOTE: MANUAL CI smoke test of the job machinery against an ephemeral CI
# SQLite DB. NOT proof that tenant production jobs ran. Production scheduling is
# owned by Render worker/cron services (render.yaml,
# docs/PHASE2_BACKGROUND_JOBS_RUNBOOK.md). Scheduled trigger removed so CI no
# longer masquerades as production execution.

on:
  workflow_dispatch:

jobs:
  contract-lifecycle-jobs:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DJANGO_ENV: production
      DJANGO_SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
      ALLOWED_HOSTS: localhost,127.0.0.1
      CSRF_TRUSTED_ORIGINS: http://localhost
      DEFAULT_FROM_EMAIL: noreply@example.com
      ALLOW_SQLITE_IN_PRODUCTION: 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/runtime.txt

      - name: Apply migrations
        run: python manage.py migrate --noinput

      - name: Run contract lifecycle jobs
        run: python manage.py run_contract_lifecycle_jobs > contract-lifecycle-jobs-run.json

      - name: Upload lifecycle evidence artifact
        uses: actions/upload-artifact@v4
        with:
          name: contract-lifecycle-ci-smoke-${{ github.run_id }}
          path: contract-lifecycle-jobs-run.json
          if-no-files-found: error
