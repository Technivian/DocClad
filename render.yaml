# CLM One free demo Blueprint.
#
# This Blueprint intentionally uses only Render resource types that support the
# Free instance type. It is suitable for demos and evaluation, not production:
# the web service spins down when idle, and the free Postgres database expires
# after 30 days. Render does not offer free workers, cron jobs, pre-deploy
# commands, or durable local disks, so those resources/features are omitted.
#
# Background work falls back to the application's synchronous/in-process path.
# Email uses Django's console backend because free web services cannot connect
# to SMTP ports 25, 465, or 587. Contract files still use operator-provided,
# S3-compatible object storage because Render's free filesystem is ephemeral.

envVarGroups:
  - name: clm-one-config
    envVars:
      - key: DJANGO_ENV
        value: production
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DB_SSL_REQUIRE
        value: "true"
      - key: MEDIA_STORAGE_BACKEND
        value: s3
      - key: GEMINI_AI_ENABLED
        value: "false"
      - key: BILLING_SELF_SERVE_ENABLED
        value: "false"
      - key: TRUST_ACCOUNTING_ENABLED
        value: "false"
      - key: DEFAULT_FROM_EMAIL
        value: onboarding@resend.dev
      - key: ESIGN_PROVIDER
        value: "null"
      - key: SSO_ENABLED
        value: "false"

databases:
  - name: clm-one-postgres
    plan: free
    region: frankfurt
    postgresMajorVersion: "16"
    databaseName: clmone
    user: clmone_app
    ipAllowList: []

services:
  - name: clm-one-web
    type: web
    runtime: python
    plan: free
    region: frankfurt
    branch: main
    autoDeployTrigger: commit
    healthCheckPath: /_health/
    buildCommand: ./build.sh
    startCommand: sh -c 'python3 manage.py migrate --noinput && exec gunicorn config.wsgi:application --bind 0.0.0.0:$PORT'
    envVars:
      - fromGroup: clm-one-config
      - key: DATABASE_URL
        fromDatabase:
          name: clm-one-postgres
          property: connectionString
      - key: APP_BASE_URL
        fromService:
          type: web
          name: clm-one-web
          envVarKey: RENDER_EXTERNAL_URL
      - key: ALLOWED_HOSTS
        value: localhost,.onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://*.onrender.com
      - key: SECURE_SSL_REDIRECT
        value: "true"
      - key: SECURE_HSTS_PRELOAD
        value: "true"

      # Required deployment inputs. Use an AWS S3 bucket or a compatible free
      # storage provider. AWS_S3_ENDPOINT_URL is optional for AWS itself.
      - key: AWS_STORAGE_BUCKET_NAME
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_S3_REGION_NAME
        sync: false
      - key: AWS_S3_ENDPOINT_URL
        sync: false
      - key: OPERATOR_ALERT_EMAIL
        sync: false
