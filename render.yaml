# Render Blueprint for DocClad.
#
# Phase 2 (production-backed automation): the platform now runs FOUR services
# that all share one database via the `docclad-shared` env group:
#   - docclad           (web)     — serves the app, runs migrations on deploy
#   - docclad-worker    (worker)  — drains the BackgroundJob queue continuously
#   - docclad-cron-dispatch (cron, */15) — queues + drains periodic jobs
#   - docclad-cron-daily    (cron, 02:30) — lifecycle promotion + retention
#
# The worker and cron jobs use the SAME DATABASE_URL as the web service, so
# renewals, reminders, obligations, SLA escalation and document extraction run
# against real tenant data — not the throwaway CI SQLite the old GitHub Actions
# schedulers used. Background workers/cron require a paid Render instance type
# (see docs/PHASE2_BACKGROUND_JOBS_RUNBOOK.md).

# Shared configuration consumed by web + worker + cron. Define secrets ONCE
# here; every service references the group so they cannot drift apart.
envVarGroups:
  - name: docclad-shared
    envVars:
      - key: DJANGO_ENV
        value: production
      # One generated secret shared by all services (group-level generateValue).
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DB_SSL_REQUIRE
        value: true

      # Database — set to your Supabase connection string. Shared by all
      # services so scheduled jobs operate on production tenant data.
      - key: DATABASE_URL
        sync: false

      # Redis — Upstash or other Redis provider (RQ enqueue + cache).
      - key: REDIS_URL
        sync: false

      # Media storage — using Render's local filesystem for now.
      - key: MEDIA_STORAGE_BACKEND
        value: filesystem
      - key: ALLOW_EPHEMERAL_MEDIA_IN_PRODUCTION
        value: "true"

      # Pilot scope flags.
      - key: GEMINI_AI_ENABLED
        value: false
      - key: BILLING_SELF_SERVE_ENABLED
        value: false
      - key: TRUST_ACCOUNTING_ENABLED
        value: false

      # Email — Resend SMTP (used by reminder/invitation jobs too).
      - key: EMAIL_HOST
        value: smtp.resend.com
      - key: EMAIL_PORT
        value: 587
      - key: EMAIL_HOST_USER
        value: resend
      - key: EMAIL_USE_TLS
        value: true
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: DEFAULT_FROM_EMAIL
        value: onboarding@resend.dev

      # Error tracking — Sentry.
      - key: SENTRY_DSN
        sync: false

      # AI — Google Gemini Flash.
      - key: GEMINI_API_KEY
        sync: false

      # E-signature — Documenso.
      - key: ESIGN_PROVIDER
        value: documenso
      - key: ESIGN_DOCUMENSO_API_KEY
        sync: false
      - key: ESIGN_DOCUMENSO_WEBHOOK_SECRET
        sync: false
      - key: ESIGN_DOCUMENSO_BASE_URL
        value: https://app.documenso.com

services:
  # --------------------------------------------------------------------------
  # Web
  # --------------------------------------------------------------------------
  - name: docclad
    type: web
    runtime: python
    plan: free
    branch: main
    autoDeployTrigger: commit
    buildCommand: ./build.sh
    startCommand: sh -c 'python3 manage.py migrate --noinput && exec gunicorn config.wsgi:application --bind 0.0.0.0:$PORT'
    envVars:
      - fromGroup: docclad-shared
      # Web-only request/security config.
      - key: ALLOWED_HOSTS
        value: localhost,.onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://*.onrender.com
      - key: SECURE_SSL_REDIRECT
        value: true
      - key: SECURE_HSTS_PRELOAD
        value: true

      # Google SSO (OIDC) — only the web tier handles interactive login.
      - key: SSO_ENABLED
        value: true
      - key: OIDC_OP_DISCOVERY_ENDPOINT
        value: https://accounts.google.com/.well-known/openid-configuration
      - key: OIDC_OP_AUTHORIZATION_ENDPOINT
        value: https://accounts.google.com/o/oauth2/v2/auth
      - key: OIDC_OP_TOKEN_ENDPOINT
        value: https://oauth2.googleapis.com/token
      - key: OIDC_OP_USER_ENDPOINT
        value: https://openidconnect.googleapis.com/v1/userinfo
      - key: OIDC_OP_JWKS_ENDPOINT
        value: https://www.googleapis.com/oauth2/v3/certs
      - key: OIDC_RP_SCOPES
        value: openid email profile
      - key: OIDC_VERIFY_SSL
        value: true
      - key: OIDC_RP_CLIENT_ID
        sync: false
      - key: OIDC_RP_CLIENT_SECRET
        sync: false

      # Stripe billing — checkout/webhooks are web-tier only.
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_STARTER_MONTHLY
        sync: false
      - key: STRIPE_PRICE_STARTER_YEARLY
        sync: false
      - key: STRIPE_PRICE_PROFESSIONAL_MONTHLY
        sync: false
      - key: STRIPE_PRICE_PROFESSIONAL_YEARLY
        sync: false

  # --------------------------------------------------------------------------
  # Background worker — drains the BackgroundJob queue continuously so
  # UI-triggered jobs (e.g. DSAR export) and queued reminders run promptly.
  # --------------------------------------------------------------------------
  - name: docclad-worker
    type: worker
    runtime: python
    plan: starter            # workers require a paid instance type
    branch: main
    autoDeployTrigger: commit
    buildCommand: ./build.sh
    startCommand: python3 manage.py run_worker --poll-interval=10 --batch-size=20
    envVars:
      - fromGroup: docclad-shared

  # --------------------------------------------------------------------------
  # Cron — periodic dispatch (every 15 min): queue per-org jobs, then drain.
  # Atomic job claiming makes this safe to overlap with the worker.
  # --------------------------------------------------------------------------
  - name: docclad-cron-dispatch
    type: cronjob
    runtime: python
    plan: starter
    branch: main
    schedule: "*/15 * * * *"
    buildCommand: ./build.sh
    startCommand: sh -c 'python3 manage.py queue_background_jobs && python3 manage.py process_background_jobs --limit 200'
    envVars:
      - fromGroup: docclad-shared

  # --------------------------------------------------------------------------
  # Cron — daily lifecycle (02:30 UTC): renewal promotion + retention archive.
  # These iterate every active organization and write per-org ScheduledJobRun
  # evidence rows.
  # --------------------------------------------------------------------------
  - name: docclad-cron-daily
    type: cronjob
    runtime: python
    plan: starter
    branch: main
    schedule: "30 2 * * *"
    buildCommand: ./build.sh
    startCommand: sh -c 'python3 manage.py run_contract_expiration && python3 manage.py run_contract_lifecycle_jobs && python3 manage.py run_retention_jobs'
    envVars:
      - fromGroup: docclad-shared
