{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="{% static 'brand/favicon.ico' %}" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="{% static 'brand/favicon-32x32.png' %}">
  <title>Page not found — CLM One</title>
</head>
<body style="margin:0;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;background:#f7f9fc;color:#111827;">
  <main style="max-width:560px;margin:14vh auto;padding:0 24px;text-align:center;">
    <img src="{% static 'brand/clm-one-logo-transparent.webp' %}" alt="CLM One" style="display:block;width:auto;height:42px;max-width:100%;object-fit:contain;margin:0 auto 12px;">
    <h1 style="font-size:28px;font-weight:800;margin:16px 0 8px;color:#111827;">Page not found</h1>
    <p style="font-size:15px;line-height:1.6;color:#4b5563;margin:0 0 24px;">
      The page you’re looking for doesn’t exist, has moved, or you don’t have access to it.
    </p>
    <a href="/" style="display:inline-block;padding:10px 20px;font-size:14px;font-weight:600;color:#fff;background:#2563eb;border-radius:8px;text-decoration:none;">Return to dashboard</a>
  </main>
</body>
</html>
