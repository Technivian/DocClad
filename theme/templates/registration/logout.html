{% extends 'base_fullscreen.html' %}
{% load static %}

{% block title %}Signed Out – CLM One{% endblock %}

{% block body %}
<div class="min-h-screen flex items-center justify-center p-4 bg-page">
    <div class="w-full max-w-md text-center">
        <div class="w-16 h-16 rounded-2xl mx-auto mb-6 flex items-center justify-center icon-soft-primary">
            <svg class="w-8 h-8 c-brand" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
        </div>
        <h1 class="text-2xl font-bold mb-2 login-title">You've been signed out</h1>
        <p class="text-sm mb-8 c-secondary">Thanks for using CLM One. See you next time.</p>
        <a href="{% url 'login' %}" class="inline-flex items-center gap-2 px-8 py-3 text-white rounded-xl font-semibold text-sm transition shadow-lg glow-btn-primary-grad-soft">
            Sign in again
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M17 8l4 4m0 0l-4 4m4-4H3"/></svg>
        </a>
    </div>
</div>
{% endblock %}
