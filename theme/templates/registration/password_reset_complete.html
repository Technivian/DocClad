{% extends 'base_fullscreen.html' %}
{% load static %}

{% block title %}Password Reset Complete – CLM One{% endblock %}

{% block body %}
<div class="min-h-screen flex items-center justify-center p-8 bg-page">
    <div class="w-full max-w-md text-center">
        <div class="flex justify-center mb-10">
            <img src="{% static 'brand/clm-one-logo-transparent.webp' %}" alt="CLM One" class="clm-one-logo clm-one-logo--auth">
        </div>

        <h1 class="text-2xl font-bold mb-4 login-title">Password updated</h1>
        <p class="text-sm mb-8 login-subtitle">
            Your password has been set. You can now sign in with your new password.
        </p>
        <a href="{% url 'login' %}" class="glow-btn glow-btn-primary-grad block text-center w-full py-3.5 text-white rounded-xl font-semibold text-sm transition-all duration-200">
            Sign in
        </a>
    </div>
</div>
{% endblock %}
