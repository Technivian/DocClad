  <span class="dc-ds-timeline-dot" aria-hidden="true"></span>
  <div>
    <div class="dc-ds-timeline-title">{{ title }}</div>
    {% if meta %}<div class="dc-ds-timeline-meta">{{ meta }}</div>{% endif %}
  </div>
</div>
