{# Additive design-system adapter partial. Include only in migrated pages. #}
<div class="dc-ds-page{% if wide %} dc-ds-page--wide{% endif %}{% if class_name %} {{ class_name }}{% endif %}">
  <div class="dc-ds-scaffold{% if with_rail %} dc-ds-scaffold--with-rail{% endif %}">
    {% if main_template %}
      {% include main_template %}
    {% endif %}
    {% if rail_template %}
      {% include "design_system/context_rail.html" with rail_template=rail_template %}
    {% endif %}
  </div>
</div>
