<form class="dc-ds-filterbar dc-ds-table-toolbar{% if class_name %} {{ class_name }}{% endif %}" method="{{ method|default:'get' }}"{% if action %} action="{{ action }}"{% endif %}{% if aria_label %} aria-label="{{ aria_label }}"{% endif %}>
  <input class="dc-ds-filterbar__search" type="search"{% if search_id %} id="{{ search_id }}"{% endif %} name="{{ search_name|default:'q' }}" value="{{ search_value|default:'' }}" placeholder="{{ placeholder|default:'Search' }}">
  <div class="dc-ds-actions">
    {% if filters_template %}{% include filters_template %}{% endif %}
    <button class="dc-ds-button" type="submit">{{ submit_label|default:"Search" }}</button>
  </div>
</form>
