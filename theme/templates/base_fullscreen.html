<!DOCTYPE html>
<html lang="en" data-theme="light">
{% load static %}
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CLM One{% endblock %}</title>
    <meta name="build-sha" content="{{ BUILD_SHA|default:'unknown' }}">
    <meta name="build-label" content="{{ BUILD_LABEL|default:'commit unknown' }}">
    <link rel="icon" href="{% static 'brand/favicon.ico' %}" sizes="any">
    <link rel="icon" type="image/png" sizes="32x32" href="{% static 'brand/favicon-32x32.png' %}">
    <link rel="icon" type="image/png" sizes="16x16" href="{% static 'brand/favicon-16x16.png' %}">
    <link rel="apple-touch-icon" sizes="180x180" href="{% static 'brand/apple-touch-icon.png' %}">
    <link rel="manifest" href="{% static 'brand/site.webmanifest' %}">
    <meta name="theme-color" content="#06204F">
    <meta property="og:title" content="CLM One">
    <meta property="og:image" content="{% static 'brand/clm-one-logo-transparent.png' %}">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="{% static 'brand/clm-one-logo-transparent.png' %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="{% static 'css/clmone-tokens.css' %}{% if ASSET_VERSION %}?v={{ ASSET_VERSION }}{% endif %}" rel="stylesheet">
    <link href="{% static 'css/dist/styles.css' %}{% if ASSET_VERSION %}?v={{ ASSET_VERSION }}{% endif %}" rel="stylesheet">
    <link href="{% static 'brand/clm-one-brand.css' %}{% if ASSET_VERSION %}?v={{ ASSET_VERSION }}{% endif %}" rel="stylesheet">
    <script src="{% static 'js/csp-handlers.js' %}" defer></script>
    <script src="{% static 'js/clmone-ui.js' %}" defer></script>
    <script nonce="{{ csp_nonce }}">
        // Public and authenticated surfaces share the same light theme.
        (function() {
            localStorage.setItem('clmone-theme', 'light');
            document.documentElement.setAttribute('data-theme', 'light');
        })();
    </script>
    <style nonce="{{ csp_nonce }}">
        * { font-family: var(--font-sans); }

        :root, [data-theme="light"] {
            --bg: var(--paper);
            --surface: var(--well);
            --surface-alt: var(--card);
            --primary: var(--seal);
            --primary-hover: var(--seal-dark);
            --primary-light: var(--color-brand-primary);
            --accent: var(--seal);
            --cta: var(--seal);
            --cta-hover: var(--seal-dark);
            --cta-glow: var(--focus-ring);
            --text-primary: var(--ink-900);
            --text-secondary: var(--ink-500);
            --text-muted: var(--ink-400);
            --text-dim: var(--ink-300);
            --border: var(--line);
            --nav-bg: var(--card);
            --primary-glow: var(--focus-ring);
            --primary-subtle: var(--seal-bg);
            --primary-bg: var(--seal-bg);
            --primary-bg-light: var(--seal-bg);
            --accent-bg: var(--seal-bg);
            --accent-bg-light: var(--seal-bg);
            --amber-color: var(--status-pending-fg);
            --amber-bg: var(--status-pending-bg);
            --error: var(--status-danger-fg);
            --error-bg: var(--status-danger-bg);
            --error-border: var(--status-danger-fg);
            --input-bg: var(--card);
            --hover-overlay: var(--well);
        }

        .theme-toggle { cursor: pointer; background: var(--surface); border: 1px solid var(--border); border-radius: 0.5rem; padding: 0.5rem; color: var(--text-secondary); transition: all 0.2s; display: flex; align-items: center; justify-content: center; }
        .theme-toggle:hover { color: var(--text-primary); border-color: var(--primary); }
        [data-theme="light"] .icon-sun { display: none; }
        [data-theme="light"] .icon-moon { display: block; }

        /* ── Auth pages (login / register) ─────────────────────────────────── */
        .login-panel-left  { background: var(--surface); }
        .login-panel-right { background: var(--bg); }
        .login-divider     { position: absolute; right: 0; top: 0; bottom: 0; width: 1px; background: linear-gradient(180deg, transparent, var(--border), transparent); }
        .login-title       { color: var(--text-primary); }
        .login-subtitle    { color: var(--text-muted); }
        .login-feature-text { color: var(--text-secondary); }
        .login-dim         { color: var(--text-dim); }
        .login-input {
            width: 100%; padding: 11px var(--space-12); border-radius: var(--radius-control);
            font-size: var(--font-size-body); transition: border-color var(--transition-base), box-shadow var(--transition-base);
            background: var(--card); border: 1px solid var(--line-strong);
            color: var(--text-primary); outline: none;
        }
        .login-input::placeholder { color: var(--text-muted); }
        .login-input:focus-visible {
            border-color: var(--ink-500);
            box-shadow: 0 0 0 2px var(--card), 0 0 0 4px color-mix(in srgb, var(--focus-ring) 42%, transparent);
        }
        .login-input.has-error { border-color: var(--error-border); }
        .glow-btn { position: relative; overflow: hidden; }
        .glow-btn::before { display: none; }
        .glow-btn:hover { transform: translateY(-1px); }
        /* ── Login inline-style cleanup helpers ────────────────────────────── */
        .bg-page             { background: var(--bg); }
        .glow-blob-primary   { background: radial-gradient(circle, var(--primary-subtle) 0%, transparent 70%); }
        .glow-blob-accent    { background: radial-gradient(circle, var(--accent-bg-light) 0%, transparent 70%); }
        .icon-box-primary    { background: var(--primary-bg); border: 1px solid var(--primary-subtle); }
        .icon-box-accent     { background: var(--accent-bg); border: 1px solid var(--primary-subtle); }
        .icon-primary-filled { background: var(--primary); box-shadow: 0 2px 8px var(--primary-glow); }
        .icon-soft-primary   { background: var(--primary-bg); }
        .c-brand             { color: var(--primary); }
        .c-brand-accent      { color: var(--accent); }
        .c-secondary         { color: var(--text-secondary); }
        .c-muted             { color: var(--text-muted); }
        .c-error             { color: var(--error); }
        .msg-box             { background: var(--surface); border: 1px solid var(--border); }
        .surface-link        { background: var(--surface); border: 1px solid var(--border); text-decoration: none; }
        .chip-primary-soft   { background: var(--primary-subtle); color: var(--primary); }
        .stat-tile-primary   { background: var(--primary-bg-light); border: 1px solid var(--primary-subtle); }
        .stat-tile-accent    { background: var(--accent-bg-light); border: 1px solid var(--primary-subtle); }
        .alert-error         { background: var(--error-bg); border: 1px solid var(--error-border); }
        .checkbox-primary    { accent-color: var(--primary); }
        .glow-btn-primary-grad,
        .glow-btn-primary-grad-soft { background: var(--cta); box-shadow: none; }
        .divider-line        { background: var(--border); }
        .btn-quiet-surface { border-color: var(--border); color: var(--text-primary); background: var(--card); }
    </style>
</head>
    <body class="bg-page login-title" data-design-system="casefile">
    {% block body %}
    <div class="flex items-center justify-center min-h-screen p-4">
        <div class="w-full max-w-md">
            {% block content %}{% endblock %}
        </div>
    </div>
    {% endblock %}

    {% include "design_system/toast_region.html" %}

</body>
</html>
