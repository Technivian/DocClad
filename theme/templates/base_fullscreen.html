<!DOCTYPE html>
<html lang="en" data-theme="dark">
{% load static %}
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}DocClad{% endblock %}</title>
    <meta name="build-sha" content="{{ BUILD_SHA|default:'unknown' }}">
    <meta name="build-label" content="{{ BUILD_LABEL|default:'commit unknown' }}">
    <link rel="icon" type="image/svg+xml" href="{% static 'img/brand/favicon.svg' %}">
    <link rel="icon" type="image/png" sizes="32x32" href="{% static 'img/brand/favicon-32.png' %}">
    <link rel="icon" type="image/png" sizes="16x16" href="{% static 'img/brand/favicon-16.png' %}">
    <link rel="apple-touch-icon" sizes="180x180" href="{% static 'img/brand/apple-touch-icon.png' %}">
    <link rel="manifest" href="{% static 'site.webmanifest' %}">
    <meta name="theme-color" content="#0B1330">
    <meta property="og:title" content="DocClad">
    <meta property="og:image" content="{% static 'img/brand/og-image.png' %}">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="{% static 'img/brand/og-image.png' %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="{% static 'css/docclad-tokens.css' %}{% if ASSET_VERSION %}?v={{ ASSET_VERSION }}{% endif %}" rel="stylesheet">
    <link href="{% static 'css/dist/styles.css' %}{% if ASSET_VERSION %}?v={{ ASSET_VERSION }}{% endif %}" rel="stylesheet">
    <script src="{% static 'js/csp-handlers.js' %}" defer></script>
    <script nonce="{{ csp_nonce }}">
        // Apply persisted theme before paint to avoid a flash.
        (function() {
            var t = localStorage.getItem('docclad-theme') || localStorage.getItem('cms-aegis-theme') || 'dark';
            document.documentElement.setAttribute('data-theme', t);
        })();
    </script>
    <style nonce="{{ csp_nonce }}">
        * { font-family: 'Inter', system-ui, -apple-system, sans-serif; }

        :root, [data-theme="dark"] {
            --bg: #0B0F19;
            --surface: #111827;
            --surface-alt: #0B0F19;
            --primary: #2563EB;
            --primary-hover: #3B82F6;
            --primary-light: #60A5FA;
            --accent: #22C55E;
            --text-primary: #F9FAFB;
            --text-secondary: #9CA3AF;
            --text-muted: #6B7280;
            --text-dim: #4B5563;
            --border: #1F2937;
            --nav-bg: rgba(11,15,25,0.92);
            --primary-glow: rgba(37,99,235,0.3);
            --primary-subtle: rgba(37,99,235,0.1);
            --primary-bg: rgba(37,99,235,0.15);
            --primary-bg-light: rgba(37,99,235,0.06);
            --accent-bg: rgba(34,197,94,0.12);
            --accent-bg-light: rgba(34,197,94,0.06);
            --amber-color: #F59E0B;
            --amber-bg: rgba(245,158,11,0.12);
            --error: #F87171;
            --error-bg: rgba(239,68,68,0.08);
            --error-border: rgba(239,68,68,0.2);
            --input-bg: #111827;
            --hover-overlay: rgba(255,255,255,0.05);
        }

        [data-theme="light"] {
            --bg: #FFFFFF;
            --surface: #F1F5F9;
            --surface-alt: #FFFFFF;
            --primary: #2563EB;
            --primary-hover: #1D4ED8;
            --primary-light: #2563EB;
            --accent: #16A34A;
            --text-primary: #0F172A;
            --text-secondary: #64748B;
            --text-muted: #94A3B8;
            --text-dim: #CBD5E1;
            --border: #E2E8F0;
            --nav-bg: rgba(255,255,255,0.92);
            --primary-glow: rgba(37,99,235,0.15);
            --primary-subtle: rgba(37,99,235,0.06);
            --primary-bg: rgba(37,99,235,0.08);
            --primary-bg-light: rgba(37,99,235,0.04);
            --accent-bg: rgba(22,163,74,0.08);
            --accent-bg-light: rgba(22,163,74,0.04);
            --amber-color: #D97706;
            --amber-bg: rgba(217,119,6,0.08);
            --error: #DC2626;
            --error-bg: #FEF2F2;
            --error-border: #FECACA;
            --input-bg: #FFFFFF;
            --hover-overlay: rgba(0,0,0,0.03);
        }

        .theme-toggle { cursor: pointer; background: var(--surface); border: 1px solid var(--border); border-radius: 0.5rem; padding: 0.5rem; color: var(--text-secondary); transition: all 0.2s; display: flex; align-items: center; justify-content: center; }
        .theme-toggle:hover { color: var(--text-primary); border-color: var(--primary); }
        [data-theme="dark"] .icon-sun { display: block; }
        [data-theme="dark"] .icon-moon { display: none; }
        [data-theme="light"] .icon-sun { display: none; }
        [data-theme="light"] .icon-moon { display: block; }

        /* ── Brand logo theme switching ────────────────────────────────────── */
        [data-theme="dark"]  .brand-logo-light { display: none; }
        [data-theme="light"] .brand-logo-dark  { display: none; }

        /* ── Brand logo sizing (SVGs have transparent backgrounds — no crop needed) ── */
        .logo-left-dark   { height: var(--docclad-logo-header-height, 48px); width: auto; display: block; object-fit: contain; }
        .logo-left-light  { height: var(--docclad-logo-header-height, 48px); width: auto; display: block; object-fit: contain; }
        .logo-right-dark  { height: 38px; width: auto; display: block; object-fit: contain; }
        .logo-right-light { height: 38px; width: auto; display: block; object-fit: contain; }

        /* ── Auth pages (login / register) ─────────────────────────────────── */
        .login-panel-left  { background: var(--surface); }
        .login-panel-right { background: var(--bg); }
        .login-divider     { position: absolute; right: 0; top: 0; bottom: 0; width: 1px; background: linear-gradient(180deg, transparent, var(--border), transparent); }
        .login-title       { color: var(--text-primary); }
        .login-subtitle    { color: var(--text-muted); }
        .login-feature-text { color: var(--text-secondary); }
        .login-dim         { color: var(--text-dim); }
        .login-input {
            width: 100%; padding: 0.75rem 1rem; border-radius: 0.75rem;
            font-size: 0.875rem; transition: border-color 0.2s, box-shadow 0.2s;
            background: var(--input-bg); border: 1px solid var(--border);
            color: var(--text-primary); outline: none;
        }
        .login-input::placeholder { color: var(--text-muted); }
        .login-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-subtle);
        }
        .login-input.has-error { border-color: var(--error-border); }
        .glow-btn { position: relative; overflow: hidden; }
        .glow-btn::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, rgba(255,255,255,0.12) 0%, transparent 50%); pointer-events: none; }
        .glow-btn:hover { transform: translateY(-1px); }
        /* ── Login inline-style cleanup helpers ────────────────────────────── */
        .bg-page             { background: var(--bg); }
        .glow-blob-primary   { background: radial-gradient(circle, var(--primary-subtle) 0%, transparent 70%); }
        .glow-blob-accent    { background: radial-gradient(circle, var(--accent-bg-light) 0%, transparent 70%); }
        .icon-box-primary    { background: var(--primary-bg); border: 1px solid rgba(37,99,235,0.15); }
        .icon-box-accent     { background: var(--accent-bg); border: 1px solid rgba(34,197,94,0.15); }
        .icon-primary-filled { background: var(--primary); box-shadow: 0 2px 8px var(--primary-glow); }
        .icon-soft-primary   { background: var(--primary-bg); }
        .c-brand             { color: var(--primary); }
        .c-brand-accent      { color: var(--accent); }
        .c-secondary         { color: var(--text-secondary); }
        .c-muted             { color: var(--text-muted); }
        .c-error             { color: var(--error); }
        .msg-box             { background: var(--surface); border: 1px solid var(--border); }
        .surface-link        { background: var(--surface); border: 1px solid var(--border); text-decoration: none; }
        .chip-primary-soft   { background: var(--primary-subtle); color: var(--primary); }
        .stat-tile-primary   { background: var(--primary-bg-light); border: 1px solid rgba(37,99,235,0.12); }
        .stat-tile-accent    { background: var(--accent-bg-light); border: 1px solid rgba(34,197,94,0.12); }
        .alert-error         { background: var(--error-bg); border: 1px solid var(--error-border); }
        .checkbox-primary    { accent-color: var(--primary); }
        .glow-btn-primary    { background: var(--primary); box-shadow: 0 8px 32px var(--primary-glow), 0 2px 4px rgba(0,0,0,0.2); }
        .glow-btn-primary-soft { background: var(--primary); box-shadow: 0 8px 24px var(--primary-glow); }
        .divider-line        { background: var(--border); }
        .btn-outline-surface { border-color: var(--border); color: var(--text-primary); background: var(--surface); }
    </style>
</head>
    <body class="bg-page login-title">
    {% block body %}
    <div class="flex items-center justify-center min-h-screen p-4">
        <div class="w-full max-w-md">
            {% block content %}{% endblock %}
        </div>
    </div>
    {% endblock %}

</body>
</html>
